// ============================================================
// RENDERING ENGINE
// ============================================================
const container = document.getElementById('presentation');
const counterEl = document.getElementById('counter');
const progressEl = document.getElementById('progress');
const notesEl = document.getElementById('notes');
let current = 0;
let notesVisible = false;

function escapeHTML(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function nl2br(str) {
  if (!str) return '';
  return escapeHTML(str).replace(/\n/g,'<br>');
}

function renderSlide(data, index) {
  const div = document.createElement('div');
  const type = data.c || 'content';
  const baseClass = ['wait','password','cta','ending','teaser'].includes(type) ? '' : 's-base';

  // Handle highlight variants (e.g. 'impact orange')
  let typeClass = type;
  let extraClass = '';
  if (type.includes(' ')) {
    const parts = type.split(' ');
    typeClass = parts[0];
    extraClass = parts.slice(1).join(' ');
  }

  div.className = `slide ${baseClass} ${typeClass} ${extraClass}`.trim();
  div.id = 'slide-' + index;
  if (index === 0) div.classList.add('active');

  let html = '';

  switch(typeClass) {
    case 'wait':
      html = `<h1>${nl2br(data.h)}</h1>`;
      if (data.s) html += `<div class="timer-box"><span>${nl2br(data.s)}</span></div>`;
      break;

    case 'title':
      if (data.h && data.h.match(/^秘密\s?[①②③]/)) {
        const num = data.h.match(/[①②③]/)[0];
        html = `<div class="section-num">${num}</div><h1>秘密 ${num}</h1>`;
        if (data.s) html += `<p>${nl2br(data.s)}</p>`;
      } else {
        html = `<h1>${nl2br(data.h)}</h1>`;
        if (data.s) html += `<p>${nl2br(data.s)}</p>`;
      }
      break;

    case 'impact':
      if (data.items && data.items.length > 0) {
        html = `<h1>${nl2br(data.items[0])}</h1>`;
        if (data.h && data.h !== data.items[0]) html += `<p>${nl2br(data.h)}</p>`;
        if (data.s) html += `<p>${nl2br(data.s)}</p>`;
      } else {
        html = `<h1>${nl2br(data.h)}</h1>`;
        if (data.s) html += `<p>${nl2br(data.s)}</p>`;
      }
      break;

    case 'content':
      html = `<h1>${nl2br(data.h)}</h1>`;
      if (data.s) html += `<p>${nl2br(data.s)}</p>`;
      if (data.items) {
        html += '<ul style="list-style:none;padding:0;margin-top:20px;">';
        data.items.forEach(it => {
          html += `<li style="font-size:30px;padding:8px 0;padding-left:50px;position:relative;"><span style="position:absolute;left:0;">&#x2714;</span> ${escapeHTML(it)}</li>`;
        });
        html += '</ul>';
      }
      break;

    case 'list':
      html = data.h ? `<h1>${nl2br(data.h)}</h1>` : '';
      html += '<ul>';
      if (data.items) {
        data.items.forEach(it => {
          const isNew = it.startsWith('[NEW]');
          const text = it.replace('[NEW] ','');
          if (isNew) {
            html += `<li class="check" style="color:#FF6B00;font-weight:700;background:rgba(255,107,0,0.08);margin:4px -20px;padding:10px 20px 10px 50px;border-radius:8px;">${escapeHTML(text)}</li>`;
          } else {
            html += `<li class="check">${escapeHTML(text)}</li>`;
          }
        });
      }
      html += '</ul>';
      if (data.s) html += `<p class="body mt-20">${nl2br(data.s)}</p>`;
      break;

    case 'chat':
      html = `<div class="chat-icon">&#x1F4AC;</div><h1>${nl2br(data.h)}</h1>`;
      if (data.s) html += `<p>${nl2br(data.s)}</p>`;
      break;

    case 'demo':
      if (data.badge) html += `<div class="badge">${escapeHTML(data.badge)}</div>`;
      html += `<h1>${nl2br(data.h)}</h1>`;
      if (data.s) html += `<p>${nl2br(data.s)}</p>`;
      break;

    case 'quote':
      html = `<div class="quotemark">&#x201C;</div>`;
      const mainText = (data.h || '').replace(/\n──.+/,'');
      html += `<blockquote>${nl2br(mainText)}</blockquote>`;
      if (data.s) {
        const sLines = data.s.split('\n');
        sLines.forEach(line => {
          if (line.startsWith('──') || line.startsWith('—')) {
            html += `<div class="attribution">${escapeHTML(line)}</div>`;
          } else {
            html += `<blockquote style="font-size:32px;border-left-color:#ccc;">${escapeHTML(line)}</blockquote>`;
          }
        });
      }
      break;

    case 'compare':
      html = `<h1>${nl2br(data.h)}</h1><div class="columns">`;
      if (data.items && data.items.length >= 2) {
        const leftItems = data.items[0].split('|');
        const rightItems = data.items[1].split('|');
        html += `<div class="col col-before"><h2>Before</h2><ul>`;
        leftItems.forEach(it => { html += `<li>${escapeHTML(it.trim())}</li>`; });
        html += `</ul></div>`;
        html += `<div class="col col-after"><h2>After</h2><ul>`;
        rightItems.forEach(it => { html += `<li>${escapeHTML(it.trim())}</li>`; });
        html += `</ul></div>`;
      }
      html += `</div>`;
      break;

    case 'stack':
      html = `<h1>${nl2br(data.h)}</h1><ul>`;
      if (data.items) {
        data.items.forEach(it => {
          const isNew = it.startsWith('[NEW]');
          const text = it.replace('[NEW] ','');
          if (isNew) {
            html += `<li class="new">${escapeHTML(text)}</li>`;
          } else {
            html += `<li>${escapeHTML(text)}</li>`;
          }
        });
      }
      html += '</ul>';
      if (data.s) html += `<div class="total">${nl2br(data.s)}</div>`;
      break;

    case 'price':
      if (data.items && data.items.length > 0) {
        const priceVal = data.items[0];
        html = `<h1>${nl2br(data.h)}</h1>`;
        html += `<div class="current">${escapeHTML(priceVal)}</div>`;
        if (data.s) html += `<p class="per-month">${nl2br(data.s)}</p>`;
      } else {
        html = `<h1>${nl2br(data.h)}</h1>`;
        if (data.s) html += `<p>${nl2br(data.s)}</p>`;
      }
      break;

    case 'cta':
      html = `<h1>${nl2br(data.h)}</h1>`;
      if (data.s) html += `<p>${nl2br(data.s)}</p>`;
      html += `<div class="btn">今すぐ申し込む</div>`;
      html += `<div class="qr-placeholder">QR CODE</div>`;
      break;

    case 'password':
      html = `<h2>パスワード発表</h2><h1>${nl2br(data.h)}</h1>`;
      if (data.s) html += `<p>${nl2br(data.s)}</p>`;
      break;

    case 'qa':
      html = `<div class="q-label">Q. よくある質問</div><h1>${nl2br(data.h)}</h1>`;
      html += `<div class="a-label">A.</div>`;
      if (data.s) html += `<p>${nl2br(data.s)}</p>`;
      break;

    case 'guarantee':
      html = `<div class="shield">&#x1F6E1;&#xFE0F;</div><h1>${nl2br(data.h)}</h1>`;
      if (data.s) html += `<p>${nl2br(data.s)}</p>`;
      break;

    case 'plan-table':
      html = `<h1>${nl2br(data.h)}</h1><div class="table">`;
      if (data.items) {
        data.items.forEach((plan, i) => {
          const parts = plan.split('|');
          const isRec = i === 1;
          html += `<div class="plan ${isRec ? 'recommended' : ''}">`;
          html += `<h2>${escapeHTML(parts[0] || '')}</h2>`;
          if (parts[1]) html += `<p style="font-size:24px;color:#666;margin-bottom:12px;">${escapeHTML(parts[1])}</p>`;
          if (parts[2]) html += `<div class="plan-price">${escapeHTML(parts[2])}</div>`;
          html += '<ul>';
          for (let j = 3; j < parts.length; j++) {
            html += `<li>&#x2714; ${escapeHTML(parts[j])}</li>`;
          }
          html += '</ul></div>';
        });
      }
      html += '</div>';
      break;

    case 'ending':
      html = `<h1>${nl2br(data.h)}</h1>`;
      if (data.s) html += `<p>${nl2br(data.s)}</p>`;
      break;

    case 'teaser':
      html = '';
      if (data.num) html += `<div class="num-badge">特典 ${escapeHTML(data.num)}</div>`;
      html += `<h1>${nl2br(data.h)}</h1>`;
      if (data.s) html += `<p>${nl2br(data.s)}</p>`;
      break;

    case 'reveal':
      html = '';
      if (data.badge) html += `<div class="reveal-badge">${escapeHTML(data.badge)}</div>`;
      html += `<h1>${nl2br(data.h)}</h1>`;
      if (data.s) html += `<p>${nl2br(data.s)}</p>`;
      break;

    case 'value':
      html = '';
      if (data.sub) html += `<h2>${escapeHTML(data.sub)}</h2>`;
      html += `<div class="value-num">${nl2br(data.h)}</div>`;
      if (data.s) html += `<p>${nl2br(data.s)}</p>`;
      if (data.bridge) html += `<div class="bridge">${nl2br(data.bridge)}</div>`;
      break;

    default:
      html = `<h1>${nl2br(data.h)}</h1>`;
      if (data.s) html += `<p>${nl2br(data.s)}</p>`;
  }

  div.innerHTML = html;
  container.appendChild(div);
}

// Render all slides
slides.forEach((s, i) => renderSlide(s, i));

const allSlides = document.querySelectorAll('.slide');
const total = allSlides.length;

function updateUI() {
  counterEl.textContent = (current + 1) + ' / ' + total;
  progressEl.style.width = ((current + 1) / total * 100) + '%';
  if (notesVisible && slides[current].note) {
    notesEl.textContent = slides[current].note;
  }
}

function goTo(n) {
  if (n < 0 || n >= total) return;
  allSlides[current].classList.remove('active');
  current = n;
  allSlides[current].classList.add('active');
  updateUI();
}

function scaleSlides() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const sw = 1920;
  const sh = 1080;
  const scale = Math.min(vw / sw, vh / sh);
  allSlides.forEach(s => {
    s.style.transform = `scale(${scale})`;
  });
}

// Keyboard navigation
document.addEventListener('keydown', function(e) {
  switch(e.key) {
    case 'ArrowRight':
    case 'ArrowDown':
    case ' ':
    case 'PageDown':
      e.preventDefault();
      goTo(current + 1);
      break;
    case 'ArrowLeft':
    case 'ArrowUp':
    case 'PageUp':
      e.preventDefault();
      goTo(current - 1);
      break;
    case 'Home':
      e.preventDefault();
      goTo(0);
      break;
    case 'End':
      e.preventDefault();
      goTo(total - 1);
      break;
    case 'n':
    case 'N':
      notesVisible = !notesVisible;
      notesEl.classList.toggle('show', notesVisible);
      updateUI();
      break;
    case 'f':
    case 'F':
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
      break;
  }
});

// Touch support
let touchStartX = 0;
document.addEventListener('touchstart', function(e) {
  touchStartX = e.touches[0].clientX;
});
document.addEventListener('touchend', function(e) {
  const diff = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(diff) > 50) {
    if (diff < 0) goTo(current + 1);
    else goTo(current - 1);
  }
});

// Init
window.addEventListener('resize', scaleSlides);
scaleSlides();
updateUI();
</script>
</body>
</html>
